#!KAMAILIO

####### Global Parameters #########

debug=2
log_stderror=yes
fork=no
children=2

# Large video INVITE/SDP messages exceed the default 4096-byte PV print buffer
# (causes "pv_printf_mode(): buffer overflow"). Raise it so formatting $rb/$mb
# and building the push body never truncates.
pv_buffer_size=16384

# Bind on all container interfaces, but ADVERTISE the server's public IP so
# Via / Record-Route / Contact carry 157.20.215.29 instead of the Docker-internal
# 172.20.0.x. Without this, in-dialog requests (BYE, re-INVITE/hold) and TCP
# connect-backs to NAT'd clients are routed to the unreachable container IP.
listen=udp:0.0.0.0:5060 advertise 157.20.215.29:5060
listen=tcp:0.0.0.0:5060 advertise 157.20.215.29:5060


####### Modules Section ########
loadmodule "db_mysql.so"

loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "htable.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "http_client.so"
loadmodule "siputils.so"
loadmodule "sqlops.so"
# kex exports the legacy flag ops (setflag/setbflag/isbflagset/...) which are
# NOT core commands in Kamailio 6.x. Without it the parser fails on setbflag().
loadmodule "kex.so"

# --- NEW: media relay + NAT handling ---
loadmodule "nathelper.so"
loadmodule "rtpengine.so"

modparam("usrloc", "db_mode", 0)
modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")
modparam("http_client", "httpcon", "node=>http://node_app:3000")
modparam("sqlops", "sqlcon", "cb=>mysql://xyz:xyz@mysql/kamailio")

modparam("auth_db", "db_url", "mysql://xyz:xyz@mysql:3306/kamailio")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "password_column", "password")
modparam("auth_db", "domain_column", "domain")
modparam("auth_db", "calculate_ha1", yes)

# --- NEW: rtpengine control socket.
# rtpengine runs on the host network (see docker-compose.yml). Reach it via the
# `rtpengine:host-gateway` alias added to the kamailio service's extra_hosts.
# If Kamailio also runs on host networking, change this to udp:127.0.0.1:22222.
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

# --- NEW: NAT keepalive / ping so registrations behind NAT stay reachable ---
# usrloc must know which branch flag marks a contact as NATed; nathelper's
# ping_nated_only reads this flag to decide which contacts to keepalive-ping.
# Without it, nathelper refuses to initialize ("no nat bflag set in usrloc module").
modparam("usrloc", "nat_bflag", 6)
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# --- Registration expiry. Default min_expires is 60, so a UA asking for
#     Expires: 5 gets silently raised to 60. Lower the floor so short
#     registrations (fast offline detection) are honored as requested.
modparam("registrar", "min_expires", 5)
modparam("registrar", "default_expires", 60)

# --- Parked-call store: when an INVITE arrives for an offline user we send a
#     push and SUSPEND the transaction, stashing its handle here keyed by the
#     callee username. When that user REGISTERs (woken by the push) we resume
#     and relay the call. autoexpire cleans up if the device never wakes.
modparam("htable", "htable", "park=>size=8;autoexpire=40;")


####### Routing Logic #######

request_route {
    # Handle in-dialog SIP requests
    if (has_totag()) {

        if (loose_route()) {

            # Decode the ;alias in the R-URI so in-dialog requests (ACK/BYE/
            # re-INVITE) reach the NATed UA on the address it really came from.
            handle_ruri_alias();

            # free the media relay when the call ends
            if (is_method("BYE")) {
                rtpengine_delete();
            }

            # keep media anchored for re-INVITE / UPDATE (hold, codec change, etc.)
            if (is_method("INVITE") || is_method("UPDATE")) {
                rtpengine_manage("replace-origin replace-session-connection ICE=remove");
            }

            if (!t_relay()) {
                sl_reply_error();
            }

            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                t_relay();
            }
            exit;
        }

        sl_send_reply("404", "Not here");
        exit;
    }

    # CANCEL has NO to-tag, so it must be handled here (not in the in-dialog
    # block above) -- match the pending INVITE transaction and relay the cancel.
    # Done before maxfwd, otherwise it falls through and gets a bogus 483.
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Caller behind NAT: force replies to the real public source and alias the
    # Contact, so 180/200 (and later ACK/BYE) don't get routed to the caller's
    # PRIVATE IP -- which times out the TCP connect and tears the call down
    # before the callee can register. REGISTER fixes its own Contact via
    # fix_nated_register() below, so skip it here.
    if (!is_method("REGISTER")) {
        force_rport();
        if (nat_uac_test("19")) {
            set_contact_alias();
            setbflag(6);
        }
    }

    # REGISTER handling
    if (is_method("REGISTER")) {

        if (!auth_check("$fd", "user_details", "1")) {
            # The first-leg REGISTER carries no credentials -> we must challenge.
            # That is NORMAL digest auth, not an error. Only log a real failure:
            # credentials WERE supplied ($au set) but were rejected (bad password
            # or stale nonce). Avoids the misleading "Auth failed" spam every
            # re-register (amplified by the short min_expires).
            if ($au != $null) {
                xlog("L_NOTICE", "[AUTH] REGISTER rejected for $au@$fd (bad credentials/stale nonce)\n");
            }
            auth_challenge("$fd", "0");
            exit;
        }

        consume_credentials();

        # --- NEW: rewrite Contact to the public source IP:port the packet really came from,
        #          otherwise the saved location points at the phone's private IP and is unreachable.
        fix_nated_register();

        $var(username) = $fU;
        $var(domain)   = $fd;
        $var(token)    = $hdr(X-Token);
        $var(exp)      = $hdr(Expires);

        if ($var(token) == $null) {
            sl_send_reply("400", "Missing Token");
            exit;
        }
        # Unregister (app going to background sends Expires: 0). We MUST call
        # save() so the registrar actually REMOVES the contact from usrloc --
        # otherwise lookup() keeps succeeding and calls get relayed to a dead
        # socket instead of triggering a push.
        if ($var(exp) == 0) {
            sql_query("cb",
                "UPDATE user_details
                 SET status='offline'
                 WHERE username='$var(username)'",
                "ra");

            save("location");
            sl_send_reply("200", "OK");
            exit;
        }
        sql_query("cb",
            "INSERT INTO user_details (username, domain, device_token)
             VALUES ('$var(username)', '$var(domain)', '$var(token)')
             ON DUPLICATE KEY UPDATE
                device_token='$var(token)'",
            "ra");

        # --- NEW: flag this contact as NATed so nathelper keepalive-pings it.
        #          Branch flag 6 matches usrloc's nat_bflag (see modparam above).
        if (nat_uac_test("19")) {
            setbflag(6);
        }

        if (!save("location")) {
            xlog("L_ERR", "Registration failed for $fu\n");
            sl_reply_error();
        }
        sl_send_reply("200", "OK");

        # --- If a call was parked for this user (we pushed them awake), resume
        #     the suspended INVITE now that they're registered, then relay it.
        if ($sht(park=>$fU::idx) != $null) {
            $var(pidx) = $sht(park=>$fU::idx);
            $var(plbl) = $sht(park=>$fU::lbl);
            $sht(park=>$fU::idx) = $null;
            $sht(park=>$fU::lbl) = $null;
            xlog("L_NOTICE", "[PUSH] $fU registered -> resuming parked call ($var(pidx):$var(plbl))\n");
            t_continue("$var(pidx)", "$var(plbl)", "RESUME_CALL");
        }
        exit;
    }

    # INVITE handling
    if (is_method("INVITE")) {

        if (!t_newtran()) {
            sl_reply_error();
            exit;
        }

        # user registered -> relay straight to the device
        if (lookup("location")) {
            record_route();
            # anchor media in rtpengine + rewrite SDP (private IP -> public IP).
            rtpengine_manage("replace-origin replace-session-connection ICE=remove");
            t_on_reply("MANAGE_MEDIA");
            if (!t_relay()) {
                sl_reply_error();
            }
            exit;
        }

        # user offline -> send a VoIP push, then PARK the call until they wake.
        $var(device_token) = $null;
        if (sql_pvquery("cb",
            "SELECT device_token FROM user_details WHERE username='$rU' AND device_token IS NOT NULL AND device_token <> '' LIMIT 1",
            "$var(device_token)") != 1 || $var(device_token) == $null) {
            xlog("L_NOTICE", "[PUSH] $rU offline and NO device token -> cannot push\n");
            t_reply("480", "Temporarily Unavailable");
            exit;
        }

        # pushHint = SIP Call-ID. We send it in the push AND stamp it on the
        # INVITE as X-PushHint (see RESUME_CALL) so the app can match the CallKit
        # call to the SIP call. withVideo is derived from the offer SDP.
        $var(vid) = "false";
        if ($rb =~ "m=video") {
            $var(vid) = "true";
        }
        $var(push_body) = "{\"deviceToken\":\"" + $var(device_token) +
            "\",\"pushHint\":\"" + $ci +
            "\",\"callerId\":\"" + $fU +
            "\",\"callerName\":\"" + $fn +
            "\",\"withVideo\":" + $var(vid) + "}";
        if (http_client_query("http://node_app:5000/send-voip-push", $var(push_body),
                "Content-Type: application/json", "$var(resp)")) {
            xlog("L_NOTICE", "[PUSH] sent for $rU (hint=$ci video=$var(vid)) -> node_app resp: $var(resp)\n");
        } else {
            xlog("L_ERR", "[PUSH] node_app call FAILED for $rU (push NOT delivered)\n");
        }

        # ringback for the caller while the callee's device wakes + registers.
        t_reply("180", "Ringing");

        # Park: suspend this INVITE and stash the handle keyed by the callee.
        # The REGISTER route resumes it via t_continue once they register.
        if (t_suspend()) {
            $sht(park=>$rU::idx) = $T(id_index);
            $sht(park=>$rU::lbl) = $T(id_label);
            xlog("L_NOTICE", "[PUSH] parked call for $rU (tx $T(id_index):$T(id_label)), awaiting register\n");
            exit;
        }
        xlog("L_ERR", "[PUSH] t_suspend failed for $rU\n");
        t_reply("500", "Server error");
        exit;
    }

    # relay all other requests
    if (!t_relay()) {
        sl_reply_error();
    }

    exit;
}


# --- Resume route: runs when a parked INVITE is continued from the REGISTER
#     handler (t_continue). The callee is now registered, so look them up and
#     relay the original INVITE through rtpengine, exactly like the online path.
route[RESUME_CALL] {
    if (lookup("location")) {
        # Stamp the same value we sent in the push (Call-ID) so the app can match
        # this INVITE to the CallKit call it created when the push arrived.
        append_hf("X-PushHint: $ci\r\n");
        record_route();
        rtpengine_manage("replace-origin replace-session-connection ICE=remove");
        t_on_reply("MANAGE_MEDIA");
        if (!t_relay()) {
            xlog("L_ERR", "[PUSH] relay failed after wake for $rU\n");
            t_reply("500", "Relay failed");
        }
    } else {
        xlog("L_NOTICE", "[PUSH] $rU still not registered on resume -> giving up\n");
        t_reply("480", "Temporarily Unavailable");
    }
}


# Rewrite SDP in the callee's provisional/final answers (180/183/200 w/ SDP).
onreply_route[MANAGE_MEDIA] {
    if (status =~ "(180)|(183)|(2[0-9][0-9])" && has_body("application/sdp")) {
        rtpengine_manage("replace-origin replace-session-connection ICE=remove");
    }
}
