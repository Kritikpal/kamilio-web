#!KAMAILIO

####### Global Parameters #########

debug=2
log_stderror=yes
fork=no
children=2

# Bind on all container interfaces, but ADVERTISE the server's public IP so
# Via / Record-Route / Contact carry 157.20.215.29 instead of the Docker-internal
# 172.20.0.x. Without this, in-dialog requests (BYE, re-INVITE/hold) and TCP
# connect-backs to NAT'd clients are routed to the unreachable container IP.
listen=udp:0.0.0.0:5060 advertise 157.20.215.29:5060
listen=tcp:0.0.0.0:5060 advertise 157.20.215.29:5060


####### Modules Section ########
loadmodule "db_mysql.so"

loadmodule "tm.so"
# tmx exports t_suspend()/t_continue() (transaction suspend & resume) used for
# the VoIP-push park-and-resume flow, plus the $T(...) transaction PVs.
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "http_client.so"
loadmodule "siputils.so"
loadmodule "sqlops.so"
# kex exports the legacy flag ops (setflag/setbflag/isbflagset/...) which are
# NOT core commands in Kamailio 6.x. Without it the parser fails on setbflag().
loadmodule "kex.so"
# htable: in-memory store used to remember a pushed (suspended) call so the
# callee's REGISTER can resume it once the iOS app wakes via VoIP push.
loadmodule "htable.so"

# --- NEW: media relay + NAT handling ---
loadmodule "nathelper.so"
loadmodule "rtpengine.so"

modparam("usrloc", "db_mode", 0)
modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")
modparam("http_client", "httpcon", "node=>http://node_app:3000")
modparam("sqlops", "sqlcon", "cb=>mysql://xyz:xyz@mysql/kamailio")

modparam("auth_db", "db_url", "mysql://xyz:xyz@mysql:3306/kamailio")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "password_column", "password")
modparam("auth_db", "domain_column", "domain")
modparam("auth_db", "calculate_ha1", yes)

# --- NEW: rtpengine control socket.
# rtpengine runs on the host network (see docker-compose.yml). Reach it via the
# `rtpengine:host-gateway` alias added to the kamailio service's extra_hosts.
# If Kamailio also runs on host networking, change this to udp:127.0.0.1:22222.
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

# --- NEW: NAT keepalive / ping so registrations behind NAT stay reachable ---
# usrloc must know which branch flag marks a contact as NATed; nathelper's
# ping_nated_only reads this flag to decide which contacts to keepalive-ping.
# Without it, nathelper refuses to initialize ("no nat bflag set in usrloc module").
modparam("usrloc", "nat_bflag", 6)
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# --- Pending pushed calls: the suspended INVITE's transaction coordinates,
#     keyed by callee username. autoexpire=40s -> if the app doesn't wake in
#     time the entry is dropped and the suspended INVITE times out on its own.
modparam("htable", "htable", "pend_idx=>size=8;autoexpire=40;")
modparam("htable", "htable", "pend_lbl=>size=8;autoexpire=40;")


####### Routing Logic #######

request_route {
    # Handle in-dialog SIP requests
    if (has_totag()) {

        if (loose_route()) {

            # free the media relay when the call ends
            if (is_method("BYE")) {
                rtpengine_delete();
            }

            # keep media anchored for re-INVITE / UPDATE (hold, codec change, etc.)
            if (is_method("INVITE") || is_method("UPDATE")) {
                rtpengine_manage("replace-origin replace-session-connection ICE=remove");
            }

            if (!t_relay()) {
                sl_reply_error();
            }

            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                t_relay();
            }
            exit;
        }

        if (is_method("CANCEL")) {
            if (t_check_trans()) {
                t_relay();
            }
            exit;
        }

        sl_send_reply("404", "Not here");
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    xlog("L_INFO","full message:\n$mb\n");
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # REGISTER handling
    if (is_method("REGISTER")) {

        if (!auth_check("$fd", "user_details", "1")) {
            xlog("L_ERR", "Auth failed for $fU@$fd\n");
            auth_challenge("$fd", "0");
            exit;
        }

        consume_credentials();

        # --- NEW: rewrite Contact to the public source IP:port the packet really came from,
        #          otherwise the saved location points at the phone's private IP and is unreachable.
        fix_nated_register();

        $var(username) = $fU;
        $var(domain)   = $fd;
        $var(token)    = $hdr(X-Token);
        $var(exp)      = $hdr(Expires);

        if ($var(token) == $null) {
            sl_send_reply("400", "Missing Token");
            exit;
        }
        # added new
        if ($var(exp) == 0) {
            sql_query("cb",
                "UPDATE user_details
                 SET status='offline'
                 WHERE username='$var(username)'",
                "ra");

            sl_send_reply("200", "OK");
            exit;
        }
        sql_query("cb",
            "INSERT INTO user_details (username, domain, device_token)
             VALUES ('$var(username)', '$var(domain)', '$var(token)')
             ON DUPLICATE KEY UPDATE
                device_token='$var(token)'",
            "ra");

        xlog("L_INFO", "User $var(username) saved in user_details\n");

        # --- NEW: flag this contact as NATed so nathelper keepalive-pings it.
        #          Branch flag 6 matches usrloc's nat_bflag (see modparam above).
        if (nat_uac_test("19")) {
            setbflag(6);
        }

        if (!save("location")) {
            xlog("L_ERR", "Registration failed for $fu\n");
            sl_reply_error();
        }
        sl_send_reply("200", "OK");

        # --- If a call was pushed to this user and is parked (suspended), resume
        #     it now that they're registered and reachable. ---
        if ($sht(pend_idx=>$fU) != $null) {
            $var(pidx) = $sht(pend_idx=>$fU);
            $var(plbl) = $sht(pend_lbl=>$fU);
            # clear first so a re-REGISTER can't resume the same call twice
            $sht(pend_idx=>$fU) = $null;
            $sht(pend_lbl=>$fU) = $null;
            xlog("L_INFO", "Resuming pushed call for $fU (idx=$var(pidx) lbl=$var(plbl))\n");
            t_continue("$var(pidx)", "$var(plbl)", "RESUME_CALL");
        }
        exit;
    }

    # INVITE handling
    if (is_method("INVITE")) {

        xlog("L_INFO", "INVITE received for $ru\n");

        if (!t_newtran()) {
            sl_reply_error();
            exit;
        }

        # user registered
        if (lookup("location")) {

            xlog("L_INFO", "User online\n");

            # --- Visibility: which device is calling and what audio/video codecs
            #     it OFFERS. The offer SDP lists every codec the caller supports
            #     (m=audio/m=video lines + a=rtpmap:<pt> <codec>/<rate>).
            xlog("L_INFO", "[CALLER-DEVICE] $fU -> $rU | UA='$ua'\n[CALLER-OFFER-SDP]\n$rb\n");

            record_route();

            # --- NEW: anchor media in rtpengine and rewrite the SDP (caller side).
            #          replace-origin + replace-session-connection swap the phone's private
            #          IP in the SDP for the server's public IP so RTP actually flows.
            rtpengine_manage("replace-origin replace-session-connection ICE=remove");

            # --- Visibility: the offer AFTER rtpengine rewrote it. The c=/m= here
            #     is the address+port the CALLEE is told to send media to (must be
            #     157.20.215.29 + a port in 30000-40000, never a private IP).
            xlog("L_INFO", "[OFFER-AFTER-RTPENGINE -> callee will send media here]\n$rb\n");

            # --- NEW: also rewrite the SDP in the callee's replies (180/183/200).
            t_on_reply("MANAGE_MEDIA");

            # --- iOS background safety net ---
            # A contact in usrloc does NOT guarantee the iOS app is awake; its SIP
            # socket may be frozen in the background. Wait only ~5s for a provisional
            # response; if none arrives, PUSH_FALLBACK wakes the app via VoIP push.
            t_set_fr(60000, 5000);
            t_on_failure("PUSH_FALLBACK");

            if (!t_relay()) {
                sl_reply_error();
            }

            exit;
        }

        # user offline
        xlog("L_INFO", "User offline -> sending VoIP push\n");

        $var(device_token) = $null;
        if (sql_pvquery("cb",
            "SELECT device_token FROM user_details WHERE username='$rU' AND device_token IS NOT NULL AND device_token <> '' LIMIT 1",
            "$var(device_token)") == 1 && $var(device_token) != $null) {

            # Include caller + Call-ID so the app can show who's calling in CallKit.
            $var(push_body) = "{\"deviceToken\":\"" + $var(device_token) +
                "\",\"from\":\"" + $fU + "\",\"callId\":\"" + $ci + "\"}";

            http_client_query(
                "http://node_app:5000/send-voip-push",
                $var(push_body),
                "Content-Type: application/json",
                "$var(resp)"
            );

            xlog("L_INFO", "Push response for $rU: $var(resp)\n");
        } else {
            xlog("L_ERR", "No device token found in user_details for $rU\n");
        }

        # --- Remember this INVITE transaction so the callee's REGISTER can
        #     resume it the instant the app wakes from the push. ---
        $sht(pend_idx=>$rU) = $T(id_index);
        $sht(pend_lbl=>$rU) = $T(id_label);

        # Tell the caller it's ringing, then SUSPEND (no final reply). The REGISTER
        # route calls t_continue() to resume; if the app never wakes within the
        # transaction lifetime, the INVITE times out and the caller gets 408.
        t_reply("180", "Ringing");
        t_suspend();
        exit;
    }

    # relay all other requests
    if (!t_relay()) {
        sl_reply_error();
    }

    exit;
}


# --- Resume route: executed (via t_continue) in the context of the original,
#     suspended INVITE once the callee's app has woken and registered. lookup()
#     now finds the fresh contact, so we can finally route the call to it. ---
route[RESUME_CALL] {
    xlog("L_INFO", "[RESUME] routing pushed INVITE to $rU\n");

    if (lookup("location")) {
        record_route();
        rtpengine_manage("replace-origin replace-session-connection ICE=remove");
        t_on_reply("MANAGE_MEDIA");
        if (!t_relay()) {
            t_reply("500", "Resume relay error");
        }
    } else {
        # Registered but still no usable contact -> end the call cleanly.
        t_reply("480", "Temporarily Unavailable");
    }
}


# --- Push fallback: fires when a REGISTERED contact failed to answer in time
#     (likely a backgrounded iOS app with a frozen socket). Wake it via VoIP push
#     and park the call so its fresh REGISTER resumes it (same path as offline). ---
failure_route[PUSH_FALLBACK] {
    # Only fall back on no-answer/timeout or transport/server errors — NOT on a
    # real user response like 486 Busy or 603 Decline.
    if (t_check_status("(408)|(5[0-9][0-9])")) {

        $var(device_token) = $null;
        if (sql_pvquery("cb",
            "SELECT device_token FROM user_details WHERE username='$rU' AND device_token IS NOT NULL AND device_token <> '' LIMIT 1",
            "$var(device_token)") == 1 && $var(device_token) != $null) {

            xlog("L_INFO", "Registered app for $rU didn't answer -> VoIP push fallback\n");
            $var(push_body) = "{\"deviceToken\":\"" + $var(device_token) +
                "\",\"from\":\"" + $fU + "\",\"callId\":\"" + $ci + "\"}";
            http_client_query(
                "http://node_app:5000/send-voip-push",
                $var(push_body),
                "Content-Type: application/json",
                "$var(resp)"
            );

            # Park this transaction; the app's REGISTER will t_continue -> RESUME_CALL.
            $sht(pend_idx=>$rU) = $T(id_index);
            $sht(pend_lbl=>$rU) = $T(id_label);
            t_suspend();
            exit;
        }
        xlog("L_ERR", "No device token for $rU -> letting $T_reply_code propagate\n");
    }
}


# --- NEW: rewrite SDP in the callee's provisional/final answers ---
onreply_route[MANAGE_MEDIA] {

    xlog("L_INFO", "RES: $rs $rr | Method: $rm | Call-ID: $ci\n");

    # Only touch rtpengine when the reply actually carries SDP (a bare 180
    # Ringing usually has none — calling answer on it does nothing useful).
    if (status =~ "(180)|(183)|(2[0-9][0-9])" && has_body("application/sdp")) {
        # --- Visibility: which device ANSWERED and the codecs it AGREED to.
        #     The answer SDP shows the negotiated audio/video codec for the call.
        xlog("L_INFO", "[CALLEE-DEVICE] UA='$hdr(User-Agent)' Server='$hdr(Server)'\n[CALLEE-ANSWER-SDP]\n$rb\n");
        rtpengine_manage("replace-origin replace-session-connection ICE=remove");
        # The answer AFTER rtpengine: the address+port the CALLER is told to send to.
        xlog("L_INFO", "[ANSWER-AFTER-RTPENGINE -> caller will send media here]\n$rb\n");
    }
}


reply_route {

    # Log basic SIP reply info
    xlog("L_INFO", "RES: $rs $rr | Method: $rm | Call-ID: $ci\n");
}
