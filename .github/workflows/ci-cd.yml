name: Deploy

on:
  push:
    branches: [old-branch]
  workflow_dispatch: {}

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            docker-compose down
            # Force-remove in case `down` left a container behind (name clash,
            # restart policy, etc.). `|| true` so a missing container doesn't
            # abort the script under `set -e`.
            docker rm -f kamailio || true
            docker rm -f node_app || true
            docker-compose up -d --build
